<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jana's Pink 寫文助手</title>
  <style>
    :root {
      --bg: #fdf8f9;
      --surface: #ffffff;
      --surface-2: #fff5f7;
      --border: #f0d9df;
      --text: #3d2f35;
      --text-muted: #8a7078;
      --accent: #e8759a;
      --accent-hover: #d45f86;
      --accent-soft: rgba(232, 117, 154, 0.12);
      --accent-deep: #c94b78;
      --sakura: #ffc9d6;
      --success: #6aab8e;
      --shadow: 0 2px 8px rgba(200, 100, 130, 0.08), 0 8px 24px rgba(200, 100, 130, 0.06);
      --radius: 14px;
      --radius-sm: 10px;
      --font: "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Hiragino Sans", sans-serif;
      --mono: "Cascadia Code", "Consolas", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 10% 0%, rgba(255, 201, 214, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 100%, rgba(232, 117, 154, 0.1) 0%, transparent 50%);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    .app {
      max-width: 920px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.25rem;
    }

    .brand {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--sakura));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      box-shadow: var(--shadow);
    }

    .brand h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent-deep);
      letter-spacing: .02em;
    }

    .brand .tagline {
      font-size: .85rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .brand .site-link {
      font-size: .78rem;
      color: var(--accent);
      text-decoration: none;
      margin-top: .15rem;
    }

    .brand .site-link:hover { text-decoration: underline; }

    .category-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: .45rem;
      margin-top: 1rem;
    }

    .pill {
      font-size: .72rem;
      font-weight: 600;
      padding: .25rem .7rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-deep);
      border: 1px solid var(--border);
    }

    .input-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      margin-bottom: 1.5rem;
    }

    .input-panel label {
      display: block;
      font-weight: 600;
      font-size: .9rem;
      color: var(--accent-deep);
      margin-bottom: .4rem;
    }

    .input-panel .hint {
      font-size: .8rem;
      color: var(--text-muted);
      margin-bottom: .75rem;
    }

    .input-row {
      display: grid;
      gap: .75rem;
      margin-bottom: .75rem;
    }

    @media (min-width: 560px) {
      .input-row { grid-template-columns: 1fr 160px; }
    }

    textarea#topic {
      width: 100%;
      min-height: 80px;
      padding: .85rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text);
      font-family: var(--font);
      font-size: .95rem;
      resize: vertical;
      transition: border-color .2s, box-shadow .2s;
    }

    textarea#topic:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    select#category {
      width: 100%;
      padding: .85rem .75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text);
      font-family: var(--font);
      font-size: .9rem;
      cursor: pointer;
    }

    select#category:focus {
      outline: none;
      border-color: var(--accent);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      margin-top: .25rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .65rem 1.2rem;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #fff;
      box-shadow: 0 2px 8px rgba(232, 117, 154, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(232, 117, 154, 0.45);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent-deep);
      background: var(--accent-soft);
    }

    .btn-copy {
      background: var(--surface);
      color: var(--accent-deep);
      border: 1px solid var(--accent);
      padding: .35rem .8rem;
      font-size: .78rem;
    }

    .btn-copy:hover { background: var(--accent-soft); }

    .btn-copy.copied {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    .output-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeIn .4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .9rem 1.25rem;
      background: linear-gradient(90deg, var(--surface-2), var(--surface));
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: .5rem;
    }

    .section-header h2 {
      font-size: .92rem;
      font-weight: 700;
      color: var(--accent-deep);
      display: flex;
      align-items: center;
      gap: .45rem;
    }

    .section-header .badge {
      font-size: .68rem;
      font-weight: 600;
      padding: .15rem .55rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-deep);
    }

    .section-body { padding: 1.25rem; }

    .title-list {
      list-style: none;
      counter-reset: titles;
    }

    .title-list li {
      counter-increment: titles;
      padding: .75rem 1rem .75rem 2.6rem;
      margin-bottom: .55rem;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--accent);
      font-size: .9rem;
      position: relative;
      line-height: 1.55;
    }

    .title-list li::before {
      content: counter(titles);
      position: absolute;
      left: .9rem;
      font-weight: 700;
      color: var(--accent);
      font-size: .8rem;
    }

    .article-draft h3 {
      font-size: 1.02rem;
      margin: 1.3rem 0 .55rem;
      color: var(--accent-deep);
      padding-bottom: .3rem;
      border-bottom: 1px dashed var(--border);
    }

    .article-draft h3:first-child { margin-top: 0; }

    .article-draft p {
      margin-bottom: .8rem;
      font-size: .9rem;
      line-height: 1.8;
    }

    .article-draft .feel {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent-deep);
      font-size: .78rem;
      padding: .15rem .5rem;
      border-radius: 4px;
      margin-bottom: .5rem;
      font-weight: 600;
    }

    .seo-pair {
      display: grid;
      gap: 1rem;
    }

    @media (min-width: 600px) {
      .seo-pair { grid-template-columns: 1fr 1fr; }
    }

    .seo-item label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .35rem;
    }

    .seo-item .value {
      background: var(--surface-2);
      padding: .8rem;
      border-radius: var(--radius-sm);
      font-size: .88rem;
      border: 1px solid var(--border);
      line-height: 1.55;
    }

    .char-count {
      font-size: .68rem;
      color: var(--text-muted);
      margin-top: .25rem;
    }

    .char-count.ok { color: var(--success); }
    .char-count.warn { color: #c47a20; }

    .social-grid {
      display: grid;
      gap: 1rem;
    }

    @media (min-width: 640px) {
      .social-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .social-card {
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      padding: 1rem;
      border: 1px solid var(--border);
    }

    .social-card .platform {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .5rem;
      display: flex;
      align-items: center;
      gap: .35rem;
    }

    .social-card .platform.fb { color: #1877f2; }
    .social-card .platform.ig { color: #e1306c; }
    .social-card .platform.threads { color: var(--text); }

    .social-card p {
      font-size: .83rem;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .social-card .copy-mini { margin-top: .65rem; width: 100%; }

    .image-prompts { display: grid; gap: .8rem; }

    .prompt-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
    }

    .prompt-card .prompt-label {
      font-size: .73rem;
      font-weight: 700;
      color: var(--accent-deep);
      margin-bottom: .45rem;
    }

    .prompt-card pre {
      font-family: var(--mono);
      font-size: .78rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    .prompt-card .ai-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      margin-bottom: .65rem;
    }

    .prompt-card .ai-tab {
      font-size: .68rem;
      font-weight: 600;
      padding: .22rem .6rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
    }

    .prompt-card .ai-tab:hover {
      border-color: var(--accent);
      color: var(--accent-deep);
    }

    .prompt-card .ai-tab.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent-deep);
    }

    .prompt-panel { display: none; }
    .prompt-panel.active { display: block; }

    .structure-note {
      font-size: .78rem;
      color: var(--text-muted);
      margin-bottom: .85rem;
      padding: .55rem .8rem;
      background: var(--accent-soft);
      border-radius: var(--radius-sm);
      line-height: 1.5;
    }

    .article-draft .aside {
      background: var(--surface-2);
      border-left: 3px solid var(--sakura);
      padding: .65rem .9rem;
      margin: .6rem 0 .9rem;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: .85rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.65;
    }

    .article-draft .qa-q {
      font-weight: 700;
      color: var(--accent-deep);
      margin: 1.1rem 0 .4rem;
      font-size: .92rem;
    }

    .article-draft .qa-q:first-of-type { margin-top: 0; }

    .article-draft .list-item {
      margin-bottom: .85rem;
      padding: .6rem .75rem;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--accent);
    }

    .article-draft .list-item strong {
      display: block;
      color: var(--accent-deep);
      margin-bottom: .25rem;
      font-size: .88rem;
    }

    .article-draft .moment {
      display: block;
      font-size: .76rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: .3rem;
    }

    .empty-state {
      text-align: center;
      padding: 3.5rem 1.5rem;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 2.8rem;
      margin-bottom: .75rem;
      opacity: .7;
    }

    .empty-state p { font-size: .9rem; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent-deep);
      color: #fff;
      padding: .7rem 1.4rem;
      border-radius: 999px;
      font-size: .85rem;
      font-weight: 600;
      opacity: 0;
      transition: all .3s ease;
      z-index: 1000;
      pointer-events: none;
      box-shadow: var(--shadow);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none !important; }

    kbd {
      display: inline-block;
      padding: .1rem .4rem;
      font-size: .72rem;
      font-family: var(--mono);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: .75rem;
      color: var(--text-muted);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="brand-icon">🌸</div>
        <h1>Jana's Pink 寫文助手</h1>
        <p class="tagline">Have a good day ;)</p>
        <a class="site-link" href="https://janapink.com" target="_blank" rel="noopener">janapink.com</a>
        <div class="category-pills">
          <span class="pill">🇯🇵 日本旅遊</span>
          <span class="pill">🍜 美食開箱</span>
          <span class="pill">🏨 住宿體驗</span>
          <span class="pill">💕 親切分享</span>
        </div>
      </div>
    </header>

    <div class="input-panel">
      <label for="topic">文章主題或關鍵字</label>
      <p class="hint">輸入景點、餐廳、飯店或旅遊主題，用逗號或換行分隔。快捷鍵：<kbd>Ctrl</kbd> + <kbd>Enter</kbd></p>
      <div class="input-row">
        <textarea id="topic" placeholder="例：東京澀谷 Shibuya Sky、大阪道頓堀美食、京都日式旅館開箱"></textarea>
        <select id="category" aria-label="文章類型">
          <option value="travel">日本旅遊</option>
          <option value="food">美食開箱</option>
          <option value="hotel">住宿體驗</option>
          <option value="guide">旅遊攻略</option>
        </select>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="generateAll">
          <span>🌸</span> 一鍵產生全部內容
        </button>
        <button class="btn btn-secondary" id="clearAll">清除結果</button>
      </div>
    </div>

    <div id="outputs">
      <div class="empty-state" id="emptyState">
        <div class="icon">✈️</div>
        <p>輸入主題後，點擊「一鍵產生全部內容」<br>為 Jana's Pink 產出專屬文章素材</p>
      </div>
    </div>

    <footer>為 <a href="https://janapink.com" target="_blank" rel="noopener">Jana's Pink</a> 量身打造 · 日本旅遊 × 美食 × 住宿分享</footer>
  </div>

  <div class="toast" id="toast">已複製到剪貼簿</div>

  <script>
    (function () {
      'use strict';

      const $ = (sel) => document.querySelector(sel);
      const topicEl = $('#topic');
      const categoryEl = $('#category');
      const outputsEl = $('#outputs');
      const emptyStateEl = $('#emptyState');
      const toastEl = $('#toast');

      const CATEGORIES = {
        travel: { label: '日本旅遊', emoji: '✈️', vibe: '探索日本的美好角落' },
        food:   { label: '美食開箱', emoji: '🍜', vibe: '用味蕾記錄旅行' },
        hotel:  { label: '住宿體驗', emoji: '🏨', vibe: '找到旅途中最舒服的家' },
        guide:  { label: '旅遊攻略', emoji: '🗺️', vibe: '幫你規劃完美行程' },
      };

      function parseTopic(raw) {
        const text = (raw || '').trim();
        if (!text) return null;
        const keywords = text.split(/[,，、\n]+/).map(k => k.trim()).filter(Boolean);
        const main = keywords[0] || text;
        return { main, keywords, full: text };
      }

      function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
      function pickN(arr, n) {
        const copy = [...arr];
        const result = [];
        while (result.length < n && copy.length) {
          const i = Math.floor(Math.random() * copy.length);
          result.push(copy.splice(i, 1)[0]);
        }
        return result;
      }

      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 2000);
      }

      async function copyText(text, btn) {
        try {
          await navigator.clipboard.writeText(text);
          if (btn) {
            const orig = btn.textContent;
            btn.classList.add('copied');
            btn.textContent = '✓ 已複製';
            setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1800);
          }
          showToast('已複製到剪貼簿');
        } catch {
          showToast('複製失敗，請手動選取');
        }
      }

      /* ── Title generators (【】format) ── */
      function getTitleTemplates(cat, topic) {
        const m = topic.main;
        const shared = [
          () => `【${m}】親身走訪心得｜Jana 真心推薦不踩雷`,
          () => `【${m}】完整攻略！在地人才知道的秘密`,
          () => `【${m}】值得去嗎？說說我的真實感受`,
          () => `【${m}】一日這樣玩｜行程＋交通＋小提醒`,
          () => `【${m}】${new Date().getFullYear()}最新！行前必看懶人包`,
          () => `【${m}】初訪也不慌｜Jana 貼心整理重點`,
          () => `【${m}】CP值超高！回訪多次的愛店分享`,
          () => `【${m}】療癒系推薦｜Have a good day 的小確幸`,
        ];

        const byCat = {
          travel: [
            () => `【${m}】日本旅遊｜漫步街頭的美好發現`,
            () => `【${m}】拍照打卡＋深度體驗，兩種玩法都分享`,
            () => `【${m}】自由行必收！交通與門票實用資訊`,
          ],
          food: [
            () => `【${m}】美食開箱｜排隊也值得的滋味`,
            () => `【${m}】吃貨必存！菜單推薦＋點餐攻略`,
            () => `【${m}】在地風味初體驗｜Jana 的味蕾日記`,
          ],
          hotel: [
            () => `【${m}】住宿開箱｜一夜好眠的秘密`,
            () => `【${m}】房型＋設施＋周邊｜訂房前先看這篇`,
            () => `【${m}】日式款待體驗｜入住真實感受分享`,
          ],
          guide: [
            () => `【${m}】旅遊攻略｜行程表直接拿走`,
            () => `【${m}】省錢又好玩｜Jana 精選路線規劃`,
            () => `【${m}】新手友善指南｜從機場到景點一次懂`,
          ],
        };

        return [...shared, ...(byCat[cat] || byCat.travel)];
      }

      function generateTitles(topic, cat) {
        const templates = getTitleTemplates(cat, topic);
        return pickN(templates, 5).map(fn => fn());
      }

      /* ── Article draft (multi-structure, personal, rich detail) ── */
      const STRUCTURES = {
        classic:  { label: '深度分享型', emoji: '📝', desc: '前言 → 分章節實用心得 → 結語' },
        story:    { label: '故事敘事型', emoji: '📖', desc: '以時間軸與現場感受串起整趟體驗' },

        const sections = [{ feel: '📋 重點清單', heading: `關於「${m}」，我建議你先記下這些`, body, isList: true, listItems: items }];

      function buildHonestDraft(topic, cat, catInfo, pools) {
        const m = topic.main;
        const intro = `這篇是「真實評測」口吻——我會把喜歡的、普通的、以及可以更好的地方都寫出來。關於「${m}」，不想包裝，只想給你一份誠實參考。`;
        const pros = pickN([
          '氛圍真的很療癒', '交通算方便', '服務態度好', '拍照很出片', '價格合理',
          '適合慢慢逛', '細節有用心', '會想再訪', '適合新手', '周邊機能好',
        ], 3);
        const cons = pickN([
          '尖峰時段較擠', '價格略高', '空間偏小', '需要排隊', '資訊標示可更清楚',
          '隔音普通', '離車站要走一陣', '選擇較少', '非全天候開放', '雨天體驗打折',
        ], 2);
        const sections = [
          { feel: '👍 我喜歡的', heading: '優點（親身感受）', body: pros.map((p, i) => `${i + 1}. ${p}`).join('\n') + `\n\n${pick(pools.sensory)}` },
          { feel: '🤔 可以更好', heading: '缺點與注意事項', body: cons.map((c, i) => `${i + 1}. ${c}`).join('\n') + `\n\n這些不是勸退，而是幫你心理建設，體驗會更順。` },

      function buildLetterDraft(topic, cat, catInfo, pools) {
        const m = topic.main;
        const intro = `親愛的你，\n\n如果你最近正在規劃行程，或只是需要一點出遠門的靈感，我想把關於「${m}」的這段經驗，像寫信一樣分享給你。`;
        const sections = [
          { feel: '💌 想說的話', heading: '為什麼想寫這封信', body: `${pick(pools.hooks)}\n\n${pick(pools.inner)}` },
          { feel: '💌 那天', heading: '那天我記得的事', body: `${pick(pools.moments)}\n\n${pick(pools.sensory)}` },
          { feel: '💌 給你的建議', heading: '若你打算去，我想囑咐幾句', body: `• ${pick(['不必趕', '記得充電', '穿好走的鞋', '先查營業時間'])}\n• ${pick(['留一點空白給意外', '拍照前先禮貌確認', '把期待放輕一點', '相信自己會喜歡'])}\n\n${pick(pools.aside)}` },

      }

      const DRAFT_BUILDERS = {
        classic: buildClassicDraft,
        story: buildStoryDraft,
        qa: buildQADraft,
        diary: buildDiaryDraft,
        listicle: buildListicleDraft,
        honest: buildHonestDraft,
        letter: buildLetterDraft,
      };

      function generateDraft(topic, cat) {
        const catInfo = CATEGORIES[cat];
        const pools = getDetailPools(cat, topic);
        const structureKey = pick(Object.keys(STRUCTURES));
        const builder = DRAFT_BUILDERS[structureKey];
        const { intro, sections, structure } = builder(topic, cat, catInfo, pools);

        const conclusions = [
          `以上就是我這次「${topic.main}」的分享。旅行的美好，常常藏在不經意的小瞬間——希望你也能擁有屬於自己的版本。有共鳴的話，留言跟我說一聲；若這篇有幫助，也歡迎轉給正在做功課的朋友。Have a good day ;)\n\n— Jana`,
          `寫到這裡，腦中又浮現「${topic.main}」的畫面。謝謝你願意讀到最後；若還有想問的，留言我會盡量回。我們 Jana's Pink 見！\n\n— Jana`,
          `每次分享完，我都覺得像是跟朋友聊完一趟小旅行。關於「${topic.main}」，歡迎用你的角度跟我交流——下次見！\n\nHave a good day ;)\n— Jana`,
          `如果這篇讓你對「${topic.main}」多了一點想像，那就太好了。日本我還會再去，也會繼續把真實感受寫在這裡。保重，路上小心。\n\n— Jana`,
        ];
        const conclusion = pick(conclusions);

        const fmt = (text) => text
          .replace(/\n/g, '</p><p>')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        const renderSectionHTML = (s) => {
          if (s.isQA) {
            const pairs = s.body.split('\n\n').map(block => {
              const lines = block.split('\n');
              const q = lines[0].replace(/^Q：/, '');
              const a = lines.slice(1).join('\n').replace(/^A：/, '');
              return `<div class="qa-q">Q：${q}</div><p>${fmt(a)}</p>`;
            }).join('');
            return `<span class="feel">${s.feel}</span><h3>${s.heading}</h3>${pairs}`;
          }
          if (s.isList && s.listItems) {
            const items = s.listItems.map(([title, desc]) =>
              `<div class="list-item"><strong>${title}</strong>${desc}</div>`
            ).join('');
            return `<span class="feel">${s.feel}</span><h3>${s.heading}</h3>${items}`;
          }
          return `<span class="feel">${s.feel}</span><h3>${s.heading}</h3><p>${fmt(s.body)}</p>`;
        };

        let html = `<span class="feel">${catInfo.emoji} ${catInfo.label}</span>`;
        html += `<div class="structure-note">${structure.emoji} 本篇結構：${structure.label} — ${structure.desc}</div>`;
        html += `<h3>${structureKey === 'letter' ? '親愛的你' : structureKey === 'diary' ? '日記開頭' : '前言'}</h3><p>${fmt(intro)}</p>`;
        sections.forEach(s => { html += renderSectionHTML(s); });
        html += `<span class="feel">🌸 結語</span><h3>${structureKey === 'letter' ? '祝福' : 'Jana 想說的話'}</h3><p>${fmt(conclusion)}</p>`;

        const plain = [
          `【${catInfo.label}】${topic.main}`,
          `【結構】${structure.label}`,
          '',
          '── 前言 ──',
          intro,
          '',
          ...sections.flatMap(s => [`── ${s.heading} ──`, s.body, '']),
          '── 結語 ──',
          conclusion,
        ].join('\n');

        return { html, plain, structure: structure.label };
      }

      /* ── SEO ── */
      function generateSEO(topic, titles, cat) {

        const descTemplates = [
